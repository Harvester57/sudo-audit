name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Test, Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
          cache: true

      - name: Verify Dependencies
        run: go mod download

      - name: Check Code Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Run Go Vet (Static Analysis)
        run: go vet ./...

      - name: Run Unit Tests
        run: go test -v -race ./...

      - name: Build Standalone Binaries (Cross-Compilation)
        run: |
          mkdir -p dist
          # Linux AMD64 (Target platform)
          env GOOS=linux GOARCH=amd64 go build -v -o dist/sudo-check-linux-amd64
          # Linux ARM64 (Target platform)
          env GOOS=linux GOARCH=arm64 go build -v -o dist/sudo-check-linux-arm64
          # Windows AMD64 (Local test platform)
          env GOOS=windows GOARCH=amd64 go build -v -o dist/sudo-check-windows-amd64.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sudo-check-binaries
          path: dist/
          retention-days: 5
