name: Go CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          cache: true

      - name: Verify Dependencies
        run: go mod download

      - name: Check Module Tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check Code Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Run Go Vet (Static Analysis)
        run: go vet ./...

      - name: Run Unit Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display Coverage Summary
        run: go tool cover -func=coverage.out

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 5

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build Standalone Binary (Cross-Compilation)
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=${GITHUB_SHA::8}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE"
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="sudo-check-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            BINARY_NAME="sudo-check-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          
          env CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="$LDFLAGS" -trimpath -v -o dist/$BINARY_NAME

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sudo-check-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 5

  release:
    name: Create Tagged Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: sudo-check-binary-*
          merge-multiple: true

      - name: Generate SBOM
        uses: sbomify/sbomify-action@ac8b0d423c90447f3011ef8ab5f9ff2e854c6931 # v26.2.0
        env:
          LOCK_FILE: go.mod
          OUTPUT_FILE: dist/sudo-check-sbom.cdx.json
          COMPONENT_NAME: sudo-check
          COMPONENT_VERSION: ${{ github.ref_name }}
          ENRICH: true
          UPLOAD: false

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release already exists. Uploading assets..."
            gh release upload "${{ github.ref_name }}" dist/* --clobber
          else
            echo "Creating new release..."
            gh release create "${{ github.ref_name }}" dist/* --title "Release ${{ github.ref_name }}" --generate-notes
          fi
